name: Install Bot Dependencies

on:
  workflow_dispatch

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Update packages
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y

      - name: Install system packages
        run: |
          sudo apt-get install -y \
          chromium-browser \
          ffmpeg \
          git \
          curl \
          wget \
          build-essential \
          python3 \
          python3-pip \
          ca-certificates \
          libx11-xcb1 \
          libxcomposite1 \
          libxcursor1 \
          libxdamage1 \
          libxi6 \
          libxtst6 \
          libnss3 \
          libcups2 \
          libxss1 \
          libxrandr2 \
          libasound2 \
          libatk1.0-0 \
          libatk-bridge2.0-0 \
          libgtk-3-0

      - name: Install Node LTS
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install global npm tools
        run: |
          sudo npm install -g pm2 yarn pnpm

      - name: Verify installs
        run: |
          node -v
          npm -v
          ffmpeg -version
          chromium-browser --version